# ─── Production Compose (Host-Only Apache) ───────────────────────────────────
# Usage:
#   cp .env.example .env
#   docker compose up -d --build
#
# Next.js runs on port 3000 inside Docker, bound ONLY to the host loopback (127.0.0.1).
# Host-level Apache handles public requests on ports 80/443 and proxies to 127.0.0.1:3000.
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── Next.js Application Server ─────────────────────────────────────────────
  nextjs:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: umis-frontend-prod
    restart: unless-stopped

    # Load all runtime secrets and config from .env on the host.
    env_file:
      - .env

    # Map Next.js to the host's loopback interface only.
    # This prevents the public internet from reaching Next.js directly,
    # but allows the host's native Apache to proxy to it.
    ports:
      - "127.0.0.1:3000:3000"

    volumes:
      - logs_data:/app/logs

    # Health check: restart the container if Next.js stops responding
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  logs_data:
    driver: local