# ─── Production Compose ───────────────────────────────────────────────────────
# Usage:
#   cp .env.example .env   # first time only — fill in real secrets
#   docker compose up -d --build
#
# Two services:
#   nextjs — the Next.js production server (port 3000, internal only)
#   nginx  — reverse proxy (port 80, exposed to the host/internet)
#
# Users connect to :80 (Nginx) → Nginx forwards to :3000 (Next.js).
# Port 3000 is NEVER directly accessible from outside the host.
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── Next.js Application Server ─────────────────────────────────────────────
  nextjs:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: umis-frontend-prod
    restart: unless-stopped

    # Load all runtime secrets and config from .env on the host.
    # Never bake secrets into the image — they stay on the server filesystem only.
    env_file:
      - .env

    # Port 3000 is intentionally NOT mapped to the host.
    # Only Nginx (via the umis-net network) can reach it.
    expose:
      - "3000"

    networks:
      - umis-net

    # Health check: restart the container if Next.js stops responding
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ── Nginx Reverse Proxy ────────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: umis-nginx-prod
    restart: unless-stopped

    ports:
      # Port 80 is the only port exposed to the outside world.
      # Certbot will add :443 here after TLS setup on the Debian server.
      - "80:80"

    volumes:
      # Mount our custom Nginx config (read-only — Nginx should never write to it)
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro

    networks:
      - umis-net

    # Nginx depends on the Next.js service being healthy before it starts routing
    depends_on:
      nextjs:
        condition: service_healthy

# ── Private Network ────────────────────────────────────────────────────────────
# Both services communicate over this isolated network.
# 'nextjs' is unreachable from the host or internet — only Nginx can reach it.
networks:
  umis-net:
    driver: bridge
