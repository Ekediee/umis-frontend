# ─── Apache Reverse Proxy Configuration ──────────────────────────────────────
# Listens on port 80 (HTTP) and forwards all requests to the Next.js container
# at http://nextjs:3000 (Docker internal network — umis-net).
#
# HTTPS/TLS: Terminate TLS at the OS level with Certbot + Let's Encrypt.
# Run on the host (after mapping :443):
#   sudo certbot --apache -d your-domain.com
# Certbot will extend this VirtualHost or create a :443 block automatically.
# ─────────────────────────────────────────────────────────────────────────────

# ── Core server identity ──────────────────────────────────────────────────────
ServerName localhost
ServerAdmin webmaster@localhost

# Suppress the "could not reliably determine the server's FQDN" warning
# in Docker where there is no real FQDN.
ServerTokens Prod
ServerSignature Off

# ── Required modules ─────────────────────────────────────────────────────────
# The official httpd image includes most modules compiled in; we load only
# what we need at runtime. Paths match the default httpd:2.4 image layout.
LoadModule mpm_event_module        modules/mod_mpm_event.so
LoadModule authz_core_module       modules/mod_authz_core.so
LoadModule log_config_module       modules/mod_log_config.so
LoadModule mime_module             modules/mod_mime.so
LoadModule dir_module              modules/mod_dir.so
LoadModule unixd_module            modules/mod_unixd.so

# Proxy stack
LoadModule proxy_module            modules/mod_proxy.so
LoadModule proxy_http_module       modules/mod_proxy_http.so
LoadModule proxy_wstunnel_module   modules/mod_proxy_wstunnel.so

# Headers & rewrite (for X-Forwarded-* and WebSocket upgrade)
LoadModule headers_module          modules/mod_headers.so
LoadModule rewrite_module          modules/mod_rewrite.so

# ── User / Group (required by mod_unixd) ─────────────────────────────────────
User  daemon
Group daemon

# ── MIME types ────────────────────────────────────────────────────────────────
TypesConfig conf/mime.types
AddType application/x-compress   .Z
AddType application/x-gzip       .gz .tgz

# ── Logging ───────────────────────────────────────────────────────────────────
ErrorLog  /proc/self/fd/2
LogLevel  warn

LogFormat "%h %l %u %t \"%r\" %>s %b \"%{Referer}i\" \"%{User-Agent}i\"" combined
CustomLog /proc/self/fd/1 combined

# ── Global proxy settings ─────────────────────────────────────────────────────
# Disable forward-proxying (security hardening — only reverse-proxy inbound)
ProxyRequests Off

# Allow large request bodies (e.g. future file uploads) — 20 MB in bytes
LimitRequestBody 20971520

# ── Virtual Host: HTTP ───────────────────────────────────────────────────────
<VirtualHost *:80>

    # Pass the original Host header through so Next.js / NextAuth see the
    # real domain name (required for NEXTAUTH_URL matching).
    ProxyPreserveHost On

    # ── Real-client headers ───────────────────────────────────────────────────
    # These mirror the proxy_set_header directives in nginx.conf so that
    # NextAuth and Next.js middleware receive accurate IP and protocol info.
    RequestHeader set X-Real-IP         "%{REMOTE_ADDR}s"
    RequestHeader set X-Forwarded-For   "%{X-Forwarded-For}i"
    RequestHeader set X-Forwarded-Proto "http"

    # ── WebSocket support ─────────────────────────────────────────────────────
    # Next.js may use WebSockets for Server-Sent Events or HMR tunnels.
    # RewriteRule catches the Upgrade header and tunnels via mod_proxy_wstunnel.
    RewriteEngine On
    RewriteCond %{HTTP:Upgrade} =websocket [NC]
    RewriteRule ^/(.*)$        ws://nextjs:3000/$1 [P,L]

    # ── Static asset caching ──────────────────────────────────────────────────
    # Next.js content-hashes these filenames so they can be cached forever.
    <LocationMatch "^/_next/static/">
        ProxyPass        http://nextjs:3000/_next/static/
        ProxyPassReverse http://nextjs:3000/_next/static/
        Header set Cache-Control "public, max-age=31536000, immutable"
    </LocationMatch>

    # Public directory assets — shorter cache window
    <LocationMatch "^/public/">
        ProxyPass        http://nextjs:3000/public/
        ProxyPassReverse http://nextjs:3000/public/
        Header set Cache-Control "public, max-age=86400"
    </LocationMatch>

    # ── All other requests → Next.js ──────────────────────────────────────────
    ProxyPass        / http://nextjs:3000/
    ProxyPassReverse / http://nextjs:3000/

    # Disable proxy-side response buffering so streaming responses
    # (React Server Components, SSE) are flushed to the client immediately.
    SetEnv proxy-sendcl         1
    SetEnv force-proxy-request  1

    # Keep connections alive to the upstream for better throughput
    SetEnv proxy-nokeepalive    0

</VirtualHost>

# ─────────────────────────────────────────────────────────────────────────────
# NOTE: After running `certbot --apache -d your-domain.com` on the host,
# Certbot will automatically add (or rewrite) a <VirtualHost *:443> block
# with the SSL certificate paths and an HTTP→HTTPS redirect rule.
# ─────────────────────────────────────────────────────────────────────────────
