# ─── Nginx Reverse Proxy Configuration ───────────────────────────────────────
# Listens on port 80 (HTTP) and forwards all requests to the Next.js container
# at http://nextjs:3000 (Docker internal network).
#
# HTTPS/TLS: Terminate TLS at the OS level with Certbot + Let's Encrypt.
# Run: sudo certbot --nginx -d your-domain.com
# Certbot will modify this file automatically to add SSL configuration.
# ─────────────────────────────────────────────────────────────────────────────

# Use the number of available CPU cores for worker processes
worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging ──────────────────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log  warn;

    # ── Performance ───────────────────────────────────────────────────────────
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript;

    # ── Upstream: Next.js container ───────────────────────────────────────────
    # 'nextjs' resolves to the Next.js service via Docker's internal DNS
    upstream nextjs_upstream {
        server nextjs:3000;
        keepalive 64;
    }

    server {
        listen 80;
        server_name _;  # Matches any hostname — Certbot will set the real domain

        # ── Allow larger request bodies for future file uploads ───────────────
        client_max_body_size 20m;

        # ── Next.js static assets: served with long-lived cache headers ───────
        # These files have content-hashed filenames so they can be cached forever.
        location /_next/static/ {
            proxy_pass http://nextjs_upstream;
            add_header Cache-Control "public, max-age=31536000, immutable";
        }

        # ── Public directory assets ───────────────────────────────────────────
        location /public/ {
            proxy_pass http://nextjs_upstream;
            add_header Cache-Control "public, max-age=86400";
        }

        # ── All other requests: proxy to Next.js ──────────────────────────────
        location / {
            proxy_pass http://nextjs_upstream;
            proxy_http_version 1.1;

            # Required for WebSocket support (Next.js HMR uses WS in dev;
            # some server-sent-events features may use it in prod too)
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection "upgrade";

            # Pass real client information to Next.js / NextAuth
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Disable buffering for streaming responses (Server Components, etc.)
            proxy_buffering    off;
            proxy_cache        off;

            proxy_read_timeout 60s;
            proxy_connect_timeout 60s;
        }
    }
}
